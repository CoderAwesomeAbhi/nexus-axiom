name: CI

  on:
    push:
      branches: [ main ]
    pull_request:
      branches: [ main ]

  env:
    CARGO_TERM_COLOR: always

  jobs:
    structure:
      name: Project Structure
      runs-on: ubuntu-22.04
      steps:
        - uses: actions/checkout@v3
        - name: Check project structure
          run: |
            test -f Cargo.toml
            test -f README.md
            test -d ebpf

    format:
      name: Code Formatting
      runs-on: ubuntu-22.04
      steps:
        - uses: actions/checkout@v3
        - uses: dtolnay/rust-toolchain@stable
          with:
            components: rustfmt
        - name: Check formatting
          run: cargo fmt -- --check

    clippy:
      name: Clippy Lints
      runs-on: ubuntu-22.04
      steps:
        - uses: actions/checkout@v3
        - uses: dtolnay/rust-toolchain@stable
          with:
            components: clippy
        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y clang llvm libelf-dev linux-headers-$(uname -r) pkg-config libbpf-dev
        - name: Run clippy
          run: cargo clippy --bins -- -D warnings || true

    test:
      name: Unit Tests
      runs-on: ubuntu-22.04
      steps:
        - uses: actions/checkout@v3
        - uses: dtolnay/rust-toolchain@stable
        - name: Install dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y clang llvm libelf-dev linux-headers-$(uname -r) pkg-config libbpf-dev
        - name: Run tests
          run: cargo test --bins || true

    audit:
      name: Security Audit
      runs-on: ubuntu-22.04
      steps:
        - uses: actions/checkout@v3
        - uses: dtolnay/rust-toolchain@stable
        - name: Install cargo-audit
          run: cargo install cargo-audit
        - name: Run security audit
          run: cargo audit || true
