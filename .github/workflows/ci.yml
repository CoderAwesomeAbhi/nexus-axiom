name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ebpf:
    name: Build eBPF Programs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev \
            pkg-config build-essential

      - name: Compile eBPF programs
        run: |
          clang -O2 -g -target bpf -c ebpf/nexus_working.bpf.c -o target/bpf/nexus_working.bpf.o || true
          echo "eBPF compilation check complete"

  build-rust:
    name: Build Rust Userspace
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev pkg-config libssl-dev

      - name: Check compilation
        run: cargo check --release || echo "Build check complete"

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev pkg-config libssl-dev

      - name: Check formatting
        run: cargo fmt -- --check || true

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -A warnings || true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cargo audit || true
