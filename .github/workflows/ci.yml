name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ebpf:
    name: Build eBPF Programs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev build-essential
      
      - name: Compile eBPF programs
        run: make ebpf
      
      - name: Upload eBPF artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ebpf-programs
          path: target/bpf/*.o

  build-rust:
    name: Build Rust Userspace
    runs-on: ubuntu-22.04
    needs: build-ebpf
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev
      
      - name: Download eBPF artifacts
        uses: actions/download-artifact@v3
        with:
          name: ebpf-programs
          path: target/bpf/
      
      - name: Build Rust
        run: cargo build --release
      
      - name: Run tests
        run: cargo test
      
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: nexus-axiom-binary
          path: target/release/nexus-axiom

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true
      
      - name: Check formatting
        run: cargo fmt -- --check
      
      - name: Run clippy
        run: cargo clippy -- -D warnings

  security-audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cargo audit
