name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ebpf:
    name: Build eBPF Programs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev pkg-config build-essential

      - name: Compile eBPF programs
        run: |
          mkdir -p target/bpf
          clang -O2 -g -target bpf -c ebpf/nexus_working.bpf.c -o target/bpf/nexus_working.bpf.o || echo "⚠️  eBPF compilation skipped (headers may be missing)"
          clang -O2 -g -target bpf -c ebpf/nexus_net.bpf.c -o target/bpf/nexus_net.bpf.o || echo "⚠️  eBPF compilation skipped (headers may be missing)"
          echo "✅ eBPF check complete"

  build-rust:
    name: Build Rust Userspace
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev pkg-config libssl-dev libseccomp-dev linux-headers-$(uname -r)

      - name: Build release
        run: cargo build --release --verbose
        env:
          RUST_BACKTRACE: 1
          CARGO_TERM_COLOR: never

      - name: Run tests
        run: cargo test

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev pkg-config libssl-dev libseccomp-dev linux-headers-$(uname -r)

      - name: Check formatting
        run: cargo fmt -- --check || echo "⚠️  Formatting issues found (non-blocking)"

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings || echo "⚠️  Clippy warnings found (non-blocking)"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cargo audit || echo "⚠️  Security audit found issues (non-blocking)"
