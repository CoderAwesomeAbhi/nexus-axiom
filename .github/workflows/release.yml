name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev build-essential
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Build release
        run: |
          make ebpf
          cargo build --release
      
      - name: Create tarball
        run: |
          mkdir -p nexus-axiom-${{ github.ref_name }}
          cp target/release/nexus-axiom nexus-axiom-${{ github.ref_name }}/
          cp target/bpf/*.o nexus-axiom-${{ github.ref_name }}/
          cp README.md LICENSE nexus-axiom-${{ github.ref_name }}/
          tar czf nexus-axiom-${{ github.ref_name }}-linux-x86_64.tar.gz nexus-axiom-${{ github.ref_name }}
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: nexus-axiom-${{ github.ref_name }}-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
