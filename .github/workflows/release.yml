name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r)
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Build release
      run: cargo build --release
    
    - name: Create tarball
      run: |
        tar -czf nexus-axiom-${{ github.ref_name }}-x86_64-linux.tar.gz \
          -C target/release nexus-axiom \
          -C ../../ README.md LICENSE
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: nexus-axiom-*.tar.gz
        body: |
          ## Nexus Axiom ${{ github.ref_name }}
          
          ### Installation
          ```bash
          tar -xzf nexus-axiom-${{ github.ref_name }}-x86_64-linux.tar.gz
          sudo ./nexus-axiom start
          ```
          
          ### What's New
          See [CHANGELOG.md](CHANGELOG.md) for details.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
