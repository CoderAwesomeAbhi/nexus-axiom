apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securitypolicies.nexus-axiom.io
spec:
  group: nexus-axiom.io
  names:
    kind: SecurityPolicy
    listKind: SecurityPolicyList
    plural: securitypolicies
    singular: securitypolicy
    shortNames:
      - sp
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - enabled
              properties:
                enabled:
                  type: boolean
                  description: Enable or disable this security policy.
                blockWX:
                  type: boolean
                  description: Block write-xor-execute memory mappings.
                  default: false
                blockPtrace:
                  type: boolean
                  description: Block ptrace syscall usage.
                  default: false
                protectedPaths:
                  type: array
                  description: Filesystem paths protected from unauthorized access.
                  items:
                    type: string
                    minLength: 1
                  default: []
                allowedProcesses:
                  type: array
                  description: Process names or paths permitted to run.
                  items:
                    type: string
                    minLength: 1
                  default: []
                auditMode:
                  type: boolean
                  description: Log violations without enforcing policy.
                  default: false
      additionalPrinterColumns:
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: AuditMode
          type: boolean
          jsonPath: .spec.auditMode
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
