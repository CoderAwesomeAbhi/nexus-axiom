apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securitypolicies.nexus-axiom.io
spec:
  group: nexus-axiom.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              mode:
                type: string
                enum: ["enforce", "audit"]
                description: "Enforcement mode: enforce blocks, audit logs only"
              allowlist:
                type: array
                items:
                  type: object
                  properties:
                    process:
                      type: string
                      description: "Process name to allowlist"
                    namespace:
                      type: string
                      description: "Kubernetes namespace"
              blockWX:
                type: boolean
                description: "Block W^X memory allocations"
              blockMprotect:
                type: boolean
                description: "Block W^X mprotect calls"
              blockPtrace:
                type: boolean
                description: "Block ptrace debugging"
              protectedPaths:
                type: array
                items:
                  type: string
                description: "File paths to protect from writes"
              networkPolicy:
                type: object
                properties:
                  blockedPorts:
                    type: array
                    items:
                      type: integer
                  blockedIPs:
                    type: array
                    items:
                      type: string
                  rateLimitPPS:
                    type: integer
                    description: "Rate limit in packets per second"
  scope: Namespaced
  names:
    plural: securitypolicies
    singular: securitypolicy
    kind: SecurityPolicy
    shortNames:
    - sp
