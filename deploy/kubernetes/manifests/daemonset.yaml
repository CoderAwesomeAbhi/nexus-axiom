apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nexus-axiom
  namespace: kube-system
  labels:
    app: nexus-axiom
    tier: security
spec:
  selector:
    matchLabels:
      app: nexus-axiom
  template:
    metadata:
      labels:
        app: nexus-axiom
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: nexus-axiom
        image: nexus-axiom:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_ADMIN
            - SYS_RESOURCE
            - NET_ADMIN
        volumeMounts:
        - name: sys
          mountPath: /sys
        - name: debugfs
          mountPath: /sys/kernel/debug
        - name: bpffs
          mountPath: /sys/fs/bpf
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NEXUS_MODE
          value: "enforce"
        - name: METRICS_PORT
          value: "9090"
        - name: DASHBOARD_PORT
          value: "8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: sys
        hostPath:
          path: /sys
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
      - name: bpffs
        hostPath:
          path: /sys/fs/bpf
      tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
