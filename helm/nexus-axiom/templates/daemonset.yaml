apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nexus-axiom.fullname" . }}
  labels:
    {{- include "nexus-axiom.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "nexus-axiom.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-axiom.selectorLabels" . | nindent 8 }}
    spec:
      hostPID: {{ .Values.hostPID }}
      hostNetwork: {{ .Values.hostNetwork }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: nexus-axiom
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          privileged: {{ .Values.privileged }}
          capabilities:
            add:
            - SYS_ADMIN
            - SYS_RESOURCE
            - NET_ADMIN
        env:
        - name: NEXUS_MODE
          value: {{ .Values.security.mode | quote }}
        - name: NEXUS_KILL_ON_VIOLATION
          value: {{ .Values.security.killOnViolation | quote }}
        - name: NEXUS_LOG_LEVEL
          value: {{ .Values.logging.level | quote }}
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
        - name: dashboard
          containerPort: 8080
          protocol: TCP
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: sys
          mountPath: /sys
          readOnly: true
        - name: config
          mountPath: /etc/nexus-axiom
          readOnly: true
      volumes:
      - name: sys
        hostPath:
          path: /sys
      - name: config
        configMap:
          name: {{ include "nexus-axiom.fullname" . }}-config
